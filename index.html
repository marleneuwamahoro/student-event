<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Student Event Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

  <nav class="bg-blue-600 text-white p-4 shadow-md sticky top-0">
    <div class="max-w-6xl mx-auto flex justify-between items-center">

      <h1 class="text-2xl font-bold">
        Event Dashboard
      </h1>

      <input
        type="text"
        id="searchInput"
        placeholder="Search events..."
        class="p-2 rounded text-black"
      />

    </div>
  </nav>

 <section class="bg-gradient-to-r from-blue-500 to-purple-600 text-white py-16 text-center">

    <h2 class="text-4xl font-bold mb-4">
      Student Event Registration System
    </h2>

    <p class="max-w-2xl mx-auto">
      Register for school events easily and manage event participation dynamically.
    </p>

  </section>
  <section class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 mt-8 p-4">

    <div class="bg-white p-6 rounded shadow text-center">
      <h3 class="text-xl font-bold">Total Events</h3>
      <p id="totalEvents" class="text-3xl mt-2">0</p>
    </div>

    <div class="bg-white p-6 rounded shadow text-center">
      <h3 class="text-xl font-bold">Registered Students</h3>
      <p id="totalRegistered" class="text-3xl mt-2">0</p>
    </div>

    <div class="bg-white p-6 rounded shadow text-center">
      <h3 class="text-xl font-bold">Remaining Seats</h3>
      <p id="remainingSeats" class="text-3xl mt-2">0</p>
    </div>

  </section>
   <section class="max-w-4xl mx-auto bg-white p-6 rounded shadow mt-8">

    <h2 class="text-2xl font-bold mb-4">
      Add New Event
    </h2>

    <form id="eventForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">

      <input
        type="text"
        id="title"
        placeholder="Event Title"
        class="border p-2 rounded"
      />

     <select id="category" class="border p-2 rounded">
  <option value="">Select Category</option>
  <option value="Technology">Technology</option>
  <option value="Sports">Sports</option>
  <option value="Education">Education</option>
  <option value="Health">Health</option>
  <option value="Entertainment">Entertainment</option>
</select>

      <input
        type="number"
        id="seats"
        placeholder="Seats"
        class="border p-2 rounded"
      />

      <button
        type="submit"
        class="bg-blue-600 text-white rounded hover:bg-blue-700"
      >
        Add Event
      </button>

    </form>

  </section>
  <section class="max-w-6xl mx-auto p-4 mt-8">

    <div
      id="eventContainer"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
    >
    </div>

  </section>


  <script src="script.js"></script>

</body>
</html>
